<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhagavad Gita Registration</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🕉 Bhagavad Gita As It Is</h1>
      <h2>Free Telugu Course Registration</h2>

      <form id="registrationForm">
        <label>Full Name</label>
        <input type="text" id="name" required />

        <label>Phone Number</label>
        <input
          type="tel"
          id="mobile"
          pattern="[0-9]{10}"
          maxlength="10"
          required
        />

        <label>Email Address</label>
        <input type="email" id="email" required />

        <label>Age</label>
        <select id="age" required>
          <option value="">Select Age</option>
          <option>Below 18</option>
          <option>18-25</option>
          <option>26-35</option>
          <option>36-50</option>
          <option>Above 50</option>
        </select>

        <label>Gender</label>
        <select id="gender" required>
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>

        <label>City / Village</label>
        <input type="text" id="city" required />

        <label>District</label>
        <input type="text" id="district" required />

        <label>State</label>
        <input type="text" id="state" required />

        <label>Preferred Class Timing</label>
        <select id="timing" required>
          <option value="">Select Timing</option>
          <option>Morning</option>
          <option>Evening</option>
          <option>Weekend</option>
        </select>

        <br /><br />

        <button type="submit">Submit</button>
      </form>

      <div id="whatsappSection">
        <h3>🙏 Registration Submitted Successfully!</h3>

        <p>Please join our WhatsApp Group for class updates.</p>

        <a
          href="https://chat.whatsapp.com/Ei3cbqJegEWC7wiefOJkDX"
          target="_blank"
          class="whatsapp-btn"
        >
          📱 Join WhatsApp Group
        </a>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
